<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spoorthi M — CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F0;
      --surface: #FFFFFF;
      --ink: #1A1814;
      --ink-muted: #6B6760;
      --ink-faint: #B0ADA8;
      --accent: #2A4A8F;
      --accent-light: #E8EDF7;
      --border: #E2DED8;
      --mono: 'DM Mono', monospace;
      --serif: 'DM Serif Display', serif;
      --sans: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .site-name {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .site-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-light);
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.06em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .version-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .btn-download {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-download:hover { background: #1e3870; transform: translateY(-1px); }
    .btn-download svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Hero strip ── */
    .hero {
      padding: 2.5rem 2rem 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .hero-name {
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .hero-name em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-meta {
      margin-top: 0.6rem;
      font-size: 13px;
      color: var(--ink-muted);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero-meta span { display: flex; align-items: center; gap: 5px; }

    .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-faint); }

    /* ── PDF viewer ── */
    .viewer-wrap {
      max-width: 960px;
      margin: 0 auto 0;
      padding: 0 2rem 2rem;
    }

    .viewer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .viewer-toolbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #FAFAF8;
    }

    .toolbar-dots { display: flex; gap: 6px; }
    .toolbar-dots span {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border);
    }
    .toolbar-dots span:nth-child(1) { background: #FF5F57; }
    .toolbar-dots span:nth-child(2) { background: #FFBD2E; }
    .toolbar-dots span:nth-child(3) { background: #27C840; }

    .toolbar-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }

    .pdf-frame {
      width: 100%;
      height: 85vh;
      min-height: 600px;
      border: none;
      display: block;
      background: #525659;
    }

    /* ── Fallback (mobile / no embed) ── */
    .pdf-fallback {
      display: none;
      padding: 3rem 2rem;
      text-align: center;
    }

    .pdf-fallback p {
      color: var(--ink-muted);
      font-size: 14px;
      margin-bottom: 1rem;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 1.25rem 2rem;
      margin-top: 2rem;
    }

    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .footer-note {
      font-size: 13px;
      color: var(--ink-muted);
    }

    .footer-note a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid var(--accent-light);
      transition: border-color 0.15s;
    }
    .footer-note a:hover { border-color: var(--accent); }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-links a:hover { color: var(--ink-muted); }

    /* ── Update timestamp ── */
    #last-updated {
      font-family: var(--mono);
      font-size: 11px;
    }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .site-name { font-size: 1rem; }
      .hero { padding: 1.5rem 1rem 1rem; }
      .viewer-wrap { padding: 0 1rem 1.5rem; }
      .pdf-frame { height: 70vh; }
      .footer-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-left">
      <span class="site-name">Spoorthi M</span>
      <span class="site-tag">CV</span>
    </div>
    <div class="header-right">
      <span class="version-badge" id="last-updated">—</span>
      <a class="btn-download" href="cv.pdf" download="Spoorthi_M_CV.pdf">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v8M5 7l3 3 3-3M2 12h12"/>
        </svg>
        Download PDF
      </a>
    </div>
  </header>

  <!-- ── Hero ── -->
  <section class="hero">
    <h1 class="hero-name">Spoorthi <em>M</em></h1>
    <div class="hero-meta">
      <span>B.Tech CSE · Amrita Vishwa Vidyapeetham</span>
      <span class="dot"></span>
      <span>Medical Imaging · Computer Vision · NeRF</span>
      <span class="dot"></span>
      <span>PhD applicant · Fall 2027</span>
    </div>
  </section>

  <!-- ── PDF Viewer ── -->
  <div class="viewer-wrap">
    <div class="viewer-card">
      <div class="viewer-toolbar">
        <div class="toolbar-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="toolbar-label">Spoorthi_M_CV.pdf</span>
        <span style="width:60px"></span>
      </div>
      <iframe
        class="pdf-frame"
        src="cv.pdf#toolbar=1&navpanes=0&view=FitH"
        title="Spoorthi M — Curriculum Vitae"
        aria-label="Embedded CV PDF"
      ></iframe>
    </div>
  </div>

  <!-- ── Footer ── -->
  <footer>
    <div class="footer-inner">
      <p class="footer-note">
        The latest version of my CV is always available at
        <a href="https://spoorthimurali15.github.io/cv/" id="cv-link">spoorthimurali15.github.io/cv</a>
      </p>
      <nav class="footer-links" aria-label="Profile links">
        <a href="https://scholar.google.com/citations?user=nUhWjdIAAAAJ" target="_blank" rel="noopener">Google Scholar</a>
        <a href="https://spoorthimurali15.github.io/spoorthi.github.io/" target="_blank" rel="noopener">Portfolio</a>
        <a href="https://www.linkedin.com/in/spoorthi-m-365905228/" target="_blank" rel="noopener">LinkedIn</a>
      </nav>
    </div>
  </footer>

  <script>
    // Show last-modified date of the PDF as a version indicator
    fetch('cv.pdf', { method: 'HEAD' })
      .then(r => {
        const lm = r.headers.get('Last-Modified');
        if (lm) {
          const d = new Date(lm);
          const str = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
          document.getElementById('last-updated').textContent = 'updated ' + str;
        }
      })
      .catch(() => {});
  </script>

</body>
</html>
